---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jboss-ai-monitor-config
  namespace: jboss-monitoring            # Change to your namespace
  labels:
    app.kubernetes.io/name: jboss-ai-monitor
data:
  # ── OpenShift / Kubernetes ──────────────────────────────────────────────
  JBOSS_NAMESPACE: "jboss-production"
  JBOSS_LABEL_SELECTOR: "app.kubernetes.io/managed-by=wildfly-operator"
  JBOSS_INSTANCE_NAME: ""              # Optional: specific WildFly CR name

  # ── Monitoring intervals ────────────────────────────────────────────────
  CHECK_INTERVAL_SECONDS: "15"         # How often to run a full cycle (seconds)
  HEALTH_CHECK_TIMEOUT: "10"           # HTTP timeout for health probes (seconds)

  # ── Health endpoints ────────────────────────────────────────────────────
  HEALTH_CHECK_URLS: "http://jboss-instance-loadbalancer.jboss-production.svc.cluster.local:8080/"
  HEALTH_CHECK_PATH: "/"                # Use / until MicroProfile Health app is deployed

  # ── Log monitoring ──────────────────────────────────────────────────────
  LOG_TAIL_LINES: "300"
  LOG_ERROR_PATTERNS: >-
    SEVERE,OutOfMemoryError,java.lang.OutOfMemoryError,DeploymentException,
    WFLYCTL.*ERROR,Caused by:,StackOverflowError,NullPointerException,
    ClassNotFoundException,NoClassDefFoundError,ConnectException,
    SocketTimeoutException,Deadlock detected,WFLYEJB.*timeout,MSC000001

  # ── AlertManager / Prometheus ────────────────────────────────────────────
  ALERTMANAGER_URL: "http://alertmanager-main.openshift-monitoring.svc.cluster.local:9093"
  PROMETHEUS_URL: "http://prometheus-k8s.openshift-monitoring.svc.cluster.local:9090"
  ALERT_NAME_FILTER: "WildFly|JBoss|EAP|Helidon"

  # ── JIRA ─────────────────────────────────────────────────────────────────
  JIRA_URL: "https://nnsaraiya.atlassian.net"
  JIRA_PROJECT_KEY: "KAN"
  JIRA_ISSUE_TYPE: "Task"
  JIRA_LABELS: "jboss,openshift,automated"

  # ── RHOAI (Red Hat OpenShift AI) ─────────────────────────────────────────
  # Base URL of the RHOAI model-serving inference endpoint (must end in /v1)
  # Replace with your own RHOAI route: oc get route -n <model-namespace>
  # e.g. https://llama-32-3b-instruct-my-first-model.apps.<rhoai-cluster>/v1
  RHOAI_API_URL: "https://<model-name>-<namespace>.apps.<rhoai-cluster>/v1"
  # Name of the deployed model as shown in RHOAI model server
  RHOAI_MODEL_NAME: "llama-32-3b-instruct"
  RHOAI_MAX_TOKENS: "2048"

  # ── Deduplication ────────────────────────────────────────────────────────
  DEDUP_WINDOW_MINUTES: "120"           # Suppress duplicate tickets for 2 hours

  # ── Feature flags ────────────────────────────────────────────────────────
  ENABLE_POD_MONITOR: "true"
  ENABLE_ALERT_MONITOR: "true"
  ENABLE_LOG_MONITOR: "true"
  ENABLE_HEALTH_MONITOR: "true"

  # ── Logging ──────────────────────────────────────────────────────────────
  LOG_LEVEL: "INFO"
