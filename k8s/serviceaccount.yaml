---
# ServiceAccount used by the monitoring agent pod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jboss-ai-monitor
  namespace: jboss-monitoring          # Change to your namespace
  labels:
    app.kubernetes.io/name: jboss-ai-monitor
    app.kubernetes.io/component: monitor

---
# ClusterRole — read-only access to pods, logs, services, and events
# across the entire cluster (needed if you monitor multiple namespaces).
# Replace with a Role + RoleBinding if you only need one namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jboss-ai-monitor
  labels:
    app.kubernetes.io/name: jboss-ai-monitor
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  # WildFly Operator CRDs
  - apiGroups: ["wildfly.org"]
    resources: ["wildflyservers", "wildflyservers/status"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jboss-ai-monitor
  labels:
    app.kubernetes.io/name: jboss-ai-monitor
subjects:
  - kind: ServiceAccount
    name: jboss-ai-monitor
    namespace: jboss-monitoring         # Change to your namespace
roleRef:
  kind: ClusterRole
  name: jboss-ai-monitor
  apiGroup: rbac.authorization.k8s.io
