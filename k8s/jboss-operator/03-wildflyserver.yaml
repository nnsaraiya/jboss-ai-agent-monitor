---
# WildFlyServer CR — creates a community WildFly instance managed by the
# WildFly Operator (community, direct install via 04-wildfly-operator-direct.yaml).
#
# This CR uses the official community WildFly image from quay.io (no Red Hat
# subscription required). It is compatible with both the community WildFly
# Operator and the Red Hat JBoss EAP Operator since both use the same
# wildfly.org/v1alpha1 API.
#
# To use Red Hat JBoss EAP 8 instead:
#   1. Install the EAP Operator via install.sh
#   2. Change applicationImage to:
#      registry.redhat.io/jboss-eap-8/eap8-openjdk17-runtime-openshift-rhel8
#   3. Create a registry.redhat.io pull secret (see install.sh)
#
apiVersion: wildfly.org/v1alpha1
kind: WildFlyServer
metadata:
  name: jboss-instance
  namespace: jboss-production
  labels:
    app.kubernetes.io/name: jboss-instance
    app.kubernetes.io/part-of: jboss-platform
    app.kubernetes.io/managed-by: wildfly-operator   # used by the AI monitor
spec:
  # ── Application image ──────────────────────────────────────────────────────
  # Community WildFly image — no pull secret required.
  # Replace with registry.redhat.io/jboss-eap-8/... for production EAP 8.
  applicationImage: "quay.io/wildfly/wildfly:latest"

  # ── Replica count ──────────────────────────────────────────────────────────
  replicas: 1

  # ── Resource limits ────────────────────────────────────────────────────────
  resources:
    requests:
      cpu: "250m"
      memory: "768Mi"
    limits:
      cpu: "1000m"
      memory: "1536Mi"

  # ── JVM options ────────────────────────────────────────────────────────────
  env:
    - name: JAVA_OPTS_APPEND
      value: >-
        -Xms256m
        -Xmx1024m
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/tmp/heapdump.hprof
        -Djboss.as.management.blocking.timeout=300
        -Dorg.jboss.logging.provider=jboss

    # Management user — remove in production, use external identity provider
    - name: ADMIN_USERNAME
      value: "admin"
    - name: ADMIN_PASSWORD
      value: "Admin1234!"

  # ── Standalone config ──────────────────────────────────────────────────────
  # WildFly ships with standalone.xml by default.
  # Uncomment to supply a custom config from a ConfigMap:
  # standaloneConfigMap:
  #   name: wildfly-standalone-config
  #   key: standalone.xml

  # ── Service account ────────────────────────────────────────────────────────
  serviceAccountName: ""
