---
# secret-template.yaml — Credentials for the JBoss AI Monitor.
#
# IMPORTANT: Fill in the real values below, then apply with:
#   oc apply -f k8s/secret-template.yaml -n jboss-monitoring
#
# NEVER commit this file with real credentials.
# The .gitignore excludes k8s/secret-template.yaml by default — verify before committing.
#
apiVersion: v1
kind: Secret
metadata:
  name: jboss-ai-monitor-secret
  namespace: jboss-monitoring          # Change to your namespace
  labels:
    app.kubernetes.io/name: jboss-ai-monitor
type: Opaque
stringData:
  # ── RHOAI (Red Hat OpenShift AI) ──────────────────────────────────────────
  # Token from the RHOAI cluster (NOT the monitor cluster).
  # Log in to the RHOAI cluster and run: oc whoami -t
  # e.g. oc login https://api.ocp.blnm4.sandbox182.opentlc.com:6443
  #      oc whoami -t
  RHOAI_API_KEY: ""

  # ── JIRA ──────────────────────────────────────────────────────────────────
  # Your Atlassian account email address
  JIRA_USER: ""
  # Atlassian API token — generate at:
  # https://id.atlassian.com/manage-profile/security/api-tokens
  JIRA_TOKEN: ""
